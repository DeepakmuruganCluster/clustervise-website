<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thank You | ClusterVise</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{
    --brand:#59E3FF;
    --accent:#8FD65E;
    --bg:#06101B;
    --bg-2:#0B1726;
    --text:#EAF4FF;
    --text-2:#AABDD3;
    --border:#1D324A;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:24px;
    font-family:'Inter',sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 14% 0%, rgba(89,227,255,.16), transparent 22%),
      linear-gradient(180deg,#08111C 0%,#06101B 44%,#08121D 100%);
  }
  .card{
    width:min(680px,100%);
    padding:42px 34px;
    border:1px solid var(--border);
    border-radius:24px;
    background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    box-shadow:0 24px 60px rgba(0,0,0,.35);
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:10px 16px;
    border-radius:999px;
    border:1px solid rgba(89,227,255,.25);
    color:var(--brand);
    font:600 13px/1 'JetBrains Mono',monospace;
    text-transform:uppercase;
    letter-spacing:.14em;
  }
  h1{
    margin:22px 0 14px;
    font:700 clamp(42px,7vw,68px)/.94 'Inter',sans-serif;
    letter-spacing:-.05em;
  }
  p{
    margin:0;
    color:var(--text-2);
    font-size:18px;
    line-height:1.7;
  }
  .accent{color:var(--accent);}
  .actions{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    margin-top:28px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:180px;
    padding:14px 20px;
    border-radius:12px;
    text-decoration:none;
    font-weight:700;
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--brand),var(--accent));
    color:#07111F;
  }
  .btn-secondary{
    border:1px solid var(--border);
    color:var(--text);
    background:rgba(255,255,255,.03);
  }
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Message Received</div>
    <h1>Thanks. <span class="accent">We’ll be in touch.</span></h1>
    <p>Your enquiry has been sent to the ClusterVise team. We usually reply within 24 hours. If you need anything sooner, email <strong>info@clustervise.com</strong>.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Back to homepage</a>
      <a class="btn btn-secondary" href="/glossary/">Browse glossary</a>
    </div>
  </main>
</body>
</html>
